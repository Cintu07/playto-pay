envVarGroups:
  - name: playto-pay-backend-env
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://playto-pay-ui.onrender.com
      - key: API_THROTTLE_MERCHANT_READS
        value: 180/min
      - key: API_THROTTLE_PAYOUT_WRITES
        value: 30/min
      - key: LOG_LEVEL
        value: INFO

services:
  - type: web
    name: playto-pay-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py migrate
    startCommand: honcho start -f Procfile.render
    healthCheckPath: /health/
    envVars:
      - fromGroup: playto-pay-backend-env
      - key: DATABASE_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

  - type: web
    name: playto-pay-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
