services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playto_pay
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    command: >
      sh -c "python manage.py migrate &&
      python manage.py seed_demo_data &&
      python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    env_file:
      - .env.example
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  beat:
    build:
      context: ./backend
    env_file:
      - .env.example
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: